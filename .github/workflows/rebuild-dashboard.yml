name: Rebuild Dashboard (Manual)

on:
  workflow_dispatch:
    inputs:
      circuit:
        description: "Circuit name (leave empty for next race)"
        required: false
        type: string
      year:
        description: "Year (default: 2026)"
        required: false
        default: "2026"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run dashboard pipeline
        run: python -m src.dashboard
        env:
          PYTHONUNBUFFERED: 1
          F1_CIRCUIT: ${{ inputs.circuit || '' }}
          F1_YEAR: ${{ inputs.year || '2026' }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
