name: Rebuild Dashboard

on:
  workflow_dispatch:
    inputs:
      circuit:
        description: "Circuit name (empty = next race)"
        required: false
        type: string
      year:
        description: "Season year"
        required: false
        default: "2026"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pipeline
        run: python -m src.dashboard
        env:
          PYTHONUNBUFFERED: 1
          F1_CIRCUIT: ${{ inputs.circuit || '' }}
          F1_YEAR: ${{ inputs.year || '2026' }}
      - name: Commit cached data
        run: |
          git config user.name "f1-bot"
          git config user.email "bot@f1-race-optimizer"
          git add data/circuits/
          if ! git diff --staged --quiet; then
            git commit -m "cache: update historical data"
            git push
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - name: Deploy
        uses: actions/deploy-pages@v5
