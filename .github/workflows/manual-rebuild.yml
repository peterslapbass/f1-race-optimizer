name: Rebuild Dashboard

on:
  workflow_dispatch:
    inputs:
      circuit:
        description: "Circuit name (empty = next race)"
        required: false
        type: string
      year:
        description: "Season year"
        required: false
        default: "2026"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pipeline
        run: python -m src.dashboard
        env:
          PYTHONUNBUFFERED: 1
          F1_CIRCUIT: ${{ inputs.circuit || '' }}
          F1_YEAR: ${{ inputs.year || '2026' }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy
        uses: actions/deploy-pages@v4
