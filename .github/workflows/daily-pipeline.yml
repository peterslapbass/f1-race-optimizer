name: F1 Race Pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: pages

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.proximity.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - name: Check race proximity
        id: proximity
        run: |
          python -c "
import json, urllib.request
from datetime import datetime, timezone
try:
  url = 'https://api.openf1.org/v1/meetings?year=2026'
  resp = urllib.request.urlopen(url)
  meetings = json.loads(resp.read())
  now = datetime.now(timezone.utc)
  for m in sorted(meetings, key=lambda x: x.get('date_start', '')):
    start = datetime.fromisoformat(m.get('date_start', '').replace('Z', '+00:00'))
    end = datetime.fromisoformat(m.get('date_end', '').replace('Z', '+00:00'))
    h_until = (start - now).total_seconds() / 3600
    h_since = (now - end).total_seconds() / 3600
    if 0 <= h_until <= 48:
      print('Race in %.0fh' % h_until)
      exit(0)
    if 0 <= h_since <= 24:
      print('Race ended %.0fh ago' % h_since)
      exit(0)
except: pass
exit(1)
" && echo "should_run=true" >> "$GITHUB_OUTPUT" || echo "should_run=false" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run pipeline
        run: python -m src.dashboard
        env:
          PYTHONUNBUFFERED: 1
      - name: Commit cached data
        run: |
          git config user.name "f1-bot"
          git config user.email "bot@f1-race-optimizer"
          git add data/circuits/
          if ! git diff --staged --quiet; then
            git commit -m "cache: update historical data"
            git push
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - name: Deploy
        uses: actions/deploy-pages@v5
